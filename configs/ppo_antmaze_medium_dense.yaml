# Phase 3: PPO on AntMaze Medium dense reward

phase: 3
version: v2
algorithm: PPO
policy: MultiInputPolicy

# Environment
env_id: AntMaze_MediumDense-v5
n_envs: 4
vec_env_type: subproc
penalize_unhealthy: true
unhealthy_penalty: -1.0
terminate_on_unhealthy: false
healthy_z_range: [0.2, 1.0]

# Training parameters
total_timesteps: 3000000
learning_rate: 0.00003
n_steps: 2048
batch_size: 64
gamma: 0.995
gae_lambda: 0.95
n_epochs: 10
ent_coef: 0.001
device: auto
verbose: 1
progress_bar: true

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
