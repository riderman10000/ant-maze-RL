# Phase 1: PPO on AntMaze UMaze dense reward with gentle reward shaping

phase: 1
version: v1-shaped
algorithm: PPO
policy: MultiInputPolicy

# Environment
env_id: AntMaze_UMazeDense-v5
n_envs: 4
vec_env_type: subproc  # use dummy if subprocesses cause issues on your machine

# Reward shaping
# The base Gymnasium Robotics dense reward is still used. These small terms
# discourage flipped postures, discourage vertical hopping, and reward
# reducing distance to the goal.
reward_shaping: true
flip_penalty: -0.1
progress_reward_scale: 1.0
vertical_motion_penalty_scale: 0.05
healthy_z_range: [0.2, 1.0]
min_upright_z: 0.3

# Training parameters
total_timesteps: 1000000
learning_rate: 0.00003
n_steps: 2048
batch_size: 64
gamma: 0.995
gae_lambda: 0.95
n_epochs: 10
ent_coef: 0.001
device: auto
verbose: 1
progress_bar: true

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
