# Phase 4: SAC on sparse AntMaze UMaze

phase: 4
version: v3
algorithm: SAC
policy: MultiInputPolicy

# Environment
env_id: AntMaze_UMaze-v5
n_envs: 1
vec_env_type: dummy
penalize_unhealthy: true
unhealthy_penalty: -1.0
terminate_on_unhealthy: false
healthy_z_range: [0.2, 1.0]

# Training parameters
total_timesteps: 3000000
learning_rate: 0.0003
buffer_size: 1000000
learning_starts: 10000
batch_size: 256
tau: 0.005
gamma: 0.995
train_freq: 1
gradient_steps: 1
ent_coef: auto
device: auto
verbose: 1
progress_bar: true
use_her: false

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
