# Phase 5: TD3 on sparse AntMaze Medium

phase: 5
version: v6-medium-sparse
algorithm: TD3
policy: MultiInputPolicy

# Environment
env_id: AntMaze_Medium-v5
n_envs: 1
vec_env_type: dummy
# Uses the original Gymnasium Robotics sparse reward as a comparison baseline.

# Training parameters
total_timesteps: 3000000
learning_rate: 0.0003
buffer_size: 1000000
learning_starts: 50000
batch_size: 256
tau: 0.005
gamma: 0.995
train_freq: 1
gradient_steps: 1
policy_delay: 2
target_policy_noise: 0.2
target_noise_clip: 0.5
action_noise_std: 0.1
device: auto
verbose: 1
progress_bar: true
use_her: false

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
