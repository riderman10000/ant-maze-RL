# Phase 5: SAC + HER on sparse AntMaze UMaze

phase: 5
version: v4-standard
algorithm: SAC
policy: MultiInputPolicy

# Environment
env_id: AntMaze_UMaze-v5
n_envs: 1
vec_env_type: dummy
# Uses the original Gymnasium Robotics reward without custom flip penalties.

# Training parameters
total_timesteps: 1000000
learning_rate: 0.0003
buffer_size: 1000000
learning_starts: 10000
batch_size: 256
tau: 0.005
gamma: 0.995
train_freq: 1
gradient_steps: 1
ent_coef: auto
device: auto
verbose: 1
progress_bar: true

# HER replay buffer
use_her: true
her_n_sampled_goal: 4
her_goal_selection_strategy: future

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
