# Phase 5: SAC fine-tuning on AntMaze UMaze dense reward

phase: 5
version: v5-umaze-dense-finetune
algorithm: SAC
policy: MultiInputPolicy

# Environment
env_id: AntMaze_UMazeDense-v5
n_envs: 1
vec_env_type: dummy
# Dense reward is useful for fine-tuning a sparse/HER checkpoint back into motion.

# Training parameters
total_timesteps: 3000000
learning_rate: 0.0001
buffer_size: 1000000
learning_starts: 10000
batch_size: 256
tau: 0.005
gamma: 0.995
train_freq: 1
gradient_steps: 1
ent_coef: auto
device: auto
verbose: 1
progress_bar: true
use_her: false

# Reproducibility
seed: 42

# Environment rendering
render_mode: rgb_array

# Logging/checkpointing/results
tensorboard_log: auto
monitor_dir: auto
checkpoint_dir: auto
checkpoint_freq: 100000
result_dir: auto
final_model_name: auto
